<div id="game-container">
<div class="flex flex-col min-h-full bg-gray-50">
    <!-- Header -->
    <header class="arcade-header flex items-center justify-between p-3">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="arcade-button px-3 py-1.5 text-sm">
            ← BACK
        </button>
        <h1 class="font-bold arcade-title">SOC OPS</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-gray-500 text-sm py-2 px-4">
        TAP A SQUARE WHEN YOU FIND A MATCH
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="arcade-alert text-center py-2 font-semibold text-sm">
        🎮 BINGO! YOU GOT A LINE! 🎮
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
